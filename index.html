<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NikkFinds</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f172a, #020617);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* Container */
.app {
  width: 350px;
  background: #1e293b;
  border-radius: 20px;
  padding: 20px;
  box-shadow: 0 0 30px rgba(0,0,0,0.6);
}

/* Header */
.header {
  text-align: center;
  font-size: 22px;
  font-weight: bold;
  color: #38bdf8;
  margin-bottom: 15px;
}

/* Input */
input {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: none;
  outline: none;
  font-size: 16px;
  margin-bottom: 10px;
}

/* Button */
button {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: none;
  background: #22c55e;
  color: black;
  font-weight: bold;
  cursor: pointer;
  font-size: 16px;
}

button:hover {
  background: #16a34a;
}

/* Result card */
.result-card {
  margin-top: 15px;
  background: #020617;
  padding: 15px;
  border-radius: 15px;
}

/* Highlight Name */
.name {
  font-size: 22px;
  font-weight: bold;
  color: #22c55e;
}

/* Highlight Location */
.location {
  font-size: 16px;
  color: #38bdf8;
  margin-bottom: 10px;
}

/* Other fields */
.row {
  font-size: 14px;
  margin: 4px 0;
}

.label {
  color: #94a3b8;
}

/* Loader */
.loader {
  text-align: center;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="app">
  <div class="header">🔍 NikkFinds</div>

  <input id="number" placeholder="Enter phone number">
  <button onclick="fetchData()">Search</button>

  <div id="result"></div>
</div>

<script>
async function fetchData() {
  let number = document.getElementById("number").value.trim();
  let resultDiv = document.getElementById("result");

  // Clean input
  number = number.replace(/\D/g, '');

  // Remove 91 if present
  if (number.startsWith("91") && number.length > 10) {
    number = number.slice(-10);
  }

  if (number.length !== 10) {
    resultDiv.innerHTML = "⚠️ Enter valid 10-digit number";
    return;
  }

  resultDiv.innerHTML = "<div class='loader'>⏳ Searching...</div>";

  try {
    let res = await fetch(`/api/get-info?number=${number}`);
    let data = await res.json();

    let info = data.result || data;

    // Extract main fields
    let name = info.name || info.Name || "Unknown";
    let location = info.location || info.Location || "Unknown";

    // Remove name & location from rest
    let details = {...info};
    delete details.name;
    delete details.Name;
    delete details.location;
    delete details.Location;

    // Format nested data
    function formatData(obj) {
      let output = "";
      for (let key in obj) {
        if (typeof obj[key] === "object" && obj[key] !== null) {
          output += `<div class="row"><span class="label">${key}:</span></div>`;
          output += `<div style="margin-left:10px">${formatData(obj[key])}</div>`;
        } else {
          output += `<div class="row"><span class="label">${key}:</span> ${obj[key]}</div>`;
        }
      }
      return output;
    }

    resultDiv.innerHTML = `
      <div class="result-card">
        <div class="name">${name}</div>
        <div class="location">📍 ${location}</div>
        ${formatData(details)}
      </div>
    `;

  } catch (err) {
    resultDiv.innerHTML = "❌ Failed to fetch data";
    console.error(err);
  }
}
</script>

</body>
</html>
